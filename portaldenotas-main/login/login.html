<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Escolar - Acesso</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2 id="tituloPortal">Portal Escolar</h2>
            <p id="subtituloPortal">Carregando sistema...</p>
        </div>
        
        <form id="formAutenticacao" onsubmit="processarFormulario(event)">
            <div class="form-grupo">
                <label for="usuario">Usuário:</label>
                <input type="text" id="usuario" placeholder="Digite o usuário" required>
            </div>
            
            <div class="form-grupo">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" placeholder="Digite a senha" required>
            </div>
            
            <button type="submit" id="btnAcao" class="btn-entrar">Entrar</button>
        </form>
        
        <div id="mensagemStatus" class="status-mensagem"></div>
    </div>

    <script src="login.js"></script>
</body>
</html>
